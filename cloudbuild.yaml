steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app:$COMMIT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "magica-chat"
      - "--image"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app:$COMMIT_SHA"
      - "--region"
      - "asia-northeast1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "NEXTAUTH_URL=https://magica-chat-465868710935.asia-northeast1.run.app,AUTH_TRUST_HOST=true"
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest"

images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app:$COMMIT_SHA"
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/magica-chat/app:latest"

options:
  logging: CLOUD_LOGGING_ONLY
